<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رسالة خاصة 💌</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital@0;1&family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,600;1,500&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  :root{
    --gold:#d9a84e;
    --gold-light:#f3d9a4;
    --rose:#7a2342;
    --rose-deep:#3d0f23;
    --cream:#fbf3e7;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;width:100%;height:100%;
    overflow:hidden;
    font-family:'Tajawal',sans-serif;
    background: radial-gradient(circle at 50% 20%, #4a1530, #1c0512 80%);
  }

  /* ---------- floating hearts background ---------- */
  .hearts{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
  .heart{
    position:absolute;bottom:-50px;color:rgba(217,168,78,0.35);
    font-size:18px;animation:floatUp linear infinite;
  }
  @keyframes floatUp{
    0%{transform:translateY(0) translateX(0) rotate(0deg);opacity:0;}
    10%{opacity:0.8;}
    100%{transform:translateY(-110vh) translateX(20px) rotate(25deg);opacity:0;}
  }

  /* ---------- SCENE 1: envelope ---------- */
  .scene{
    position:fixed;inset:0;
    display:flex;align-items:center;justify-content:center;
    flex-direction:column;
    transition:opacity 1s ease, visibility 1s;
    z-index:2;
  }
  #scene-envelope{opacity:1;visibility:visible;}
  #scene-envelope.hide{opacity:0;visibility:hidden;pointer-events:none;}

  .hint{
    color:var(--gold-light);
    font-size:15px;letter-spacing:1px;margin-bottom:28px;
    opacity:0.85;text-align:center;
    animation:pulseHint 2.4s ease-in-out infinite;
  }
  @keyframes pulseHint{0%,100%{opacity:0.55;}50%{opacity:1;}}

  .envelope-wrap{
    position:relative;width:300px;height:200px;cursor:pointer;
    transform:scale(1);
    transition:transform .35s ease;
  }
  .envelope-wrap:hover{transform:scale(1.04);}

  .envelope{
    position:absolute;inset:0;
    filter:drop-shadow(0 18px 30px rgba(0,0,0,0.55));
  }
  .env-body{
    position:absolute;left:0;top:30px;width:100%;height:170px;
    background:linear-gradient(145deg,var(--rose),var(--rose-deep));
    border-radius:6px;
    border:1px solid rgba(217,168,78,0.5);
    overflow:hidden;
  }
  .env-body::before{ /* bottom V shadow */
    content:'';position:absolute;left:0;bottom:0;width:100%;height:100%;
    background:linear-gradient(135deg, transparent 49%, rgba(0,0,0,0.25) 50%),
               linear-gradient(225deg, transparent 49%, rgba(0,0,0,0.25) 50%);
    background-size:50% 100%;background-position:left,right;background-repeat:no-repeat;
  }
  .env-flap{
    position:absolute;left:0;top:30px;width:100%;height:0;
    border-left:150px solid transparent;
    border-right:150px solid transparent;
    border-top:100px solid var(--rose);
    transform-origin:top;
    transition:transform .9s cubic-bezier(.6,-0.28,.74,.05);
    z-index:3;
    filter:drop-shadow(0 4px 6px rgba(0,0,0,0.3));
  }
  .seal{
    position:absolute;top:78px;left:50%;transform:translate(-50%,-50%);
    width:46px;height:46px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, var(--gold-light), var(--gold) 60%, #9c6a1d 100%);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 3px 8px rgba(0,0,0,0.5);
    z-index:5;color:#5a3a0c;font-size:18px;
    transition:opacity .4s ease, transform .4s ease;
  }
  .letter-peek{
    position:absolute;left:24px;top:46px;width:252px;height:140px;
    background:var(--cream);
    border-radius:4px;
    box-shadow:0 -4px 10px rgba(0,0,0,0.15) inset;
    z-index:2;
    opacity:0;
    pointer-events:none;
    transform:translateY(40px) scale(0.92);
    transition:opacity .4s ease, transform .5s ease;
  }

  .envelope-wrap.opened .env-flap{transform:rotateX(180deg);}
  .envelope-wrap.opened .seal{opacity:0;transform:translate(-50%,-50%) scale(0.4);}
  .envelope-wrap.opened .letter-peek{
    opacity:1;
    pointer-events:auto;
    transform:translateY(-18px) scale(1);
    transition:opacity .4s ease .55s, transform .55s ease .55s;
  }
  .letter-peek.pulled-out{
    transform:translateY(-190px) scale(1.06) !important;
    opacity:1 !important;
    transition:transform .65s cubic-bezier(.34,1.25,.64,1), opacity .5s ease !important;
  }

  .tap-again{
    margin-top:26px;color:var(--gold-light);font-size:13px;opacity:0;
    transition:opacity .6s ease .5s;
  }
  .envelope-wrap.opened ~ .tap-again{opacity:0.8;}

  /* ---------- SCENE 2: full letter ---------- */
  #scene-letter{
    opacity:0;visibility:hidden;pointer-events:none;
    z-index:5;
  }
  #scene-letter.show{opacity:1;visibility:visible;pointer-events:auto;}

  .paper{
    width:min(90vw,520px);
    min-height:340px;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.04), transparent 18%),
      var(--cream);
    border-radius:6px;
    padding:42px 36px;
    box-shadow:0 25px 60px rgba(0,0,0,0.55), 0 0 0 1px rgba(217,168,78,0.3);
    position:relative;
    transform:scale(0.85) translateY(30px);
    animation:paperIn .7s ease forwards;
    color:#3d2310;
  }
  @keyframes paperIn{to{transform:scale(1) translateY(0);}}

  .paper::before{
    content:'❦';
    display:block;text-align:center;color:var(--gold);
    font-size:26px;margin-bottom:14px;
  }
  .letter-text{
    font-family:'Amiri','Tajawal',serif;
    font-size:21px;line-height:2.1;
    text-align:center;
    min-height:160px;
    white-space:pre-wrap;
  }
  .cursor{
    display:inline-block;width:2px;background:#3d2310;
    animation:blink 0.9s steps(1) infinite;margin-right:1px;
  }
  @keyframes blink{50%{opacity:0;}}

  .paper-foot{
    text-align:center;margin-top:18px;font-size:22px;color:var(--gold);
    opacity:0;transition:opacity .6s ease;
  }
  .paper-foot.show{opacity:1;}

  /* fold-out closing animation */
  .paper.closing{
    animation:foldClose .9s ease forwards;
  }
  @keyframes foldClose{
    0%{transform:scale(1) translateY(0);opacity:1;}
    100%{transform:scale(0.15) translateY(160px) rotateX(40deg);opacity:0;}
  }

  /* ---------- SCENE 3: social page ---------- */
  #scene-social{
    opacity:0;visibility:hidden;pointer-events:none;
    background: radial-gradient(circle at 50% 0%, #5c1b3a, #1c0512 75%);
    z-index:6;
    transition:opacity 1.1s ease, visibility 1.1s;
  }
  #scene-social.show{opacity:1;visibility:visible;pointer-events:auto;}

  .social-title-ar{
    font-family:'Amiri',serif;
    color:var(--gold-light);
    font-size:22px;margin-bottom:6px;text-align:center;
    opacity:0.9;
  }
  .social-title-en{
    font-family:'Great Vibes', cursive;
    color:var(--gold);
    font-size:52px;
    margin:0 0 36px 0;
    text-align:center;
    text-shadow:0 4px 14px rgba(217,168,78,0.4);
  }
  .icons-row{
    display:flex;gap:22px;flex-wrap:wrap;justify-content:center;
    max-width:480px;
  }
  .icon-btn{
    width:64px;height:64px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:26px;color:var(--cream);
    background:linear-gradient(145deg, rgba(217,168,78,0.18), rgba(217,168,78,0.05));
    border:1px solid rgba(217,168,78,0.45);
    text-decoration:none;
    transition:transform .3s ease, background .3s ease, box-shadow .3s ease;
    box-shadow:0 6px 16px rgba(0,0,0,0.35);
  }
  .icon-btn:hover{
    transform:translateY(-6px) scale(1.07);
    background:linear-gradient(145deg, var(--gold), #9c6a1d);
    color:#2a0f0f;
    box-shadow:0 12px 24px rgba(217,168,78,0.45);
  }
  .icon-btn.disabled{
    opacity:0.35;filter:grayscale(1);cursor:default;
  }
  .social-footer{
    margin-top:34px;color:rgba(243,217,164,0.55);font-size:12px;letter-spacing:0.5px;
  }
</style>
</head>
<body>

<div class="hearts" id="hearts"></div>

<!-- SCENE 1 -->
<div class="scene" id="scene-envelope">
  <div class="hint">اضغط على الظرف لتفتحه 💌</div>
  <div class="envelope-wrap" id="envelopeWrap">
    <div class="envelope">
      <div class="letter-peek" id="letterPeek"></div>
      <div class="env-body"></div>
      <div class="env-flap" id="envFlap"></div>
      <div class="seal" id="seal"><i class="fa-solid fa-heart"></i></div>
    </div>
  </div>
  <div class="tap-again">اضغط على الورقة لقراءتها</div>
</div>

<!-- SCENE 2 -->
<div class="scene" id="scene-letter">
  <div class="paper" id="paper">
    <div class="letter-text" id="letterText"></div>
    <div class="paper-foot" id="paperFoot">🫶❤️</div>
  </div>
</div>

<!-- SCENE 3 -->
<div class="scene" id="scene-social">
  <div class="social-title-ar">راسلني هنا</div>
  <div class="social-title-en">Message me</div>
  <div class="icons-row">
    <a class="icon-btn" href="https://wa.me/213796514353" target="_blank" title="WhatsApp">
      <i class="fa-brands fa-whatsapp"></i>
    </a>
    <a class="icon-btn" href="https://www.instagram.com/chikor_youcef?igsh=MXYxbjJnZHQ1ajc1aA==" target="_blank" title="Instagram">
      <i class="fa-brands fa-instagram"></i>
    </a>
    <a class="icon-btn" href="https://www.facebook.com/youcef.chikor.2025" target="_blank" title="Facebook">
      <i class="fa-brands fa-facebook"></i>
    </a>
    <a class="icon-btn" href="https://www.snapchat.com/add/youcef_chikor31?share_id=LL6w1Wxbsd4&locale=fr-FR" target="_blank" title="Snapchat">
      <i class="fa-brands fa-snapchat"></i>
    </a>
  </div>
  <div class="social-footer">made with ❤️</div>
</div>

<script>
  // ----- floating hearts -----
  const heartsWrap = document.getElementById('hearts');
  const heartSymbols = ['❤','💛','♥','✦'];
  for(let i=0;i<22;i++){
    const h = document.createElement('div');
    h.className='heart';
    h.textContent = heartSymbols[Math.floor(Math.random()*heartSymbols.length)];
    h.style.left = Math.random()*100+'vw';
    h.style.fontSize = (12+Math.random()*14)+'px';
    h.style.animationDuration = (6+Math.random()*8)+'s';
    h.style.animationDelay = (Math.random()*8)+'s';
    heartsWrap.appendChild(h);
  }

  // ----- Scene refs -----
  const envelopeWrap = document.getElementById('envelopeWrap');
  const sceneEnvelope = document.getElementById('scene-envelope');
  const sceneLetter = document.getElementById('scene-letter');
  const sceneSocial = document.getElementById('scene-social');
  const paper = document.getElementById('paper');
  const letterText = document.getElementById('letterText');
  const paperFoot = document.getElementById('paperFoot');

const fullMessage = "sm7ili la tblitek brk 3jbtini ctt mbgitch nratik😂🫶";

  let envelopeOpened = false;
  let letterOpened = false;

  // Step 1: open envelope
  envelopeWrap.addEventListener('click', () => {
    if(envelopeOpened) {
      // second click on envelope after opening -> go read letter
      openLetterScene();
      return;
    }
    envelopeWrap.classList.add('opened');
    envelopeOpened = true;
  });

  function openLetterScene(){
    if(letterOpened) return;
    letterOpened = true;
    const peek = document.getElementById('letterPeek');
    peek.classList.add('pulled-out');
    setTimeout(() => {
      sceneEnvelope.classList.add('hide');
      sceneLetter.classList.add('show');
      setTimeout(typeMessage, 900);
    }, 600);
  }

  // Step 2: typewriter
  function typeMessage(){
    let i = 0;
    letterText.innerHTML = '<span class="cursor">&nbsp;</span>';
    const interval = setInterval(() => {
      if(i < fullMessage.length){
        const typedSoFar = fullMessage.substring(0, i+1);
        letterText.innerHTML = escapeHtml(typedSoFar) + '<span class="cursor">&nbsp;</span>';
        i++;
      } else {
        clearInterval(interval);
        letterText.innerHTML = escapeHtml(fullMessage);
        paperFoot.classList.add('show');
        setTimeout(closeLetterAndGo, 1800);
      }
    }, 55);
  }

  function escapeHtml(str){
    return str
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/\n/g,'<br>');
  }

  // Step 3: fold the paper closed, then go to social scene
  function closeLetterAndGo(){
    paper.classList.add('closing');
    setTimeout(() => {
      sceneLetter.classList.remove('show');
      sceneSocial.classList.add('show');
    }, 850);
  }
</script>

</body>
  </html>
